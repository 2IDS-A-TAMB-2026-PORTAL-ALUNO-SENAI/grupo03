<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno SENAI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .banner_degrade {
            background: linear-gradient(135deg, #003366, #0055aa);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        .banner_degrade h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .banner_degrade p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 20px auto;
        }

        .acessibilidade {
            background-color: #f8f9fa;
            padding: 10px;
            text-align: center;
        }

        .acessibilidade button {
            margin: 5px;
        }

        .texto-grande {
            font-size: 1.2em;
        }

        footer {
            background-color: #003366;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    Portal do Aluno SENAI
                </a>

                <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Cursos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Notas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contato</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Botões de acessibilidade -->
        <div class="acessibilidade">
            <button class="btn btn-secondary btn-sm" onclick="aumentarFonte()">
                A+
            </button>

            <button class="btn btn-secondary btn-sm" onclick="diminuirFonte()">
                A-
            </button>

            <button class="btn btn-dark btn-sm" onclick="altoContraste()">
                Alto Contraste
            </button>
        </div>
    </header>

    <!-- Banner Principal -->
    <section class="banner">
        <div class="container">
            <h1>Bem-vindo ao Portal do Aluno SENAI</h1>

            <p>
                Acesse informações acadêmicas, acompanhe seu desempenho,
                consulte notas e frequência, além de realizar seu cadastro
                de forma rápida e segura.
            </p>

            <button class="btn btn-warning btn-lg" onclick="realizarCadastro()">
                Realizar Cadastro
            </button>
        </div>
    </section>

    <footer>
        © 2026 Portal do Aluno SENAI
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function realizarCadastro() {
            Swal.fire({
                title: 'Cadastro',
                text: 'Você será redirecionado para a página de cadastro.',
                icon: 'info',
                confirmButtonText: 'Continuar'
            });
        }

        function aumentarFonte() {
            document.body.classList.add('texto-grande');
        }

        function diminuirFonte() {
            document.body.classList.remove('texto-grande');
        }

        function altoContraste() {
            document.body.classList.toggle('bg-dark');
            document.body.classList.toggle('text-white');
        }
    </script>

</body>
</html>
